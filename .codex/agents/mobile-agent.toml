name = "mobile-agent"
description = "Owns indra/agents/mobile_agent/. Voice interface (Whisper STT, multilingual translation, TTS), photo-to-query with AR overlay payloads, offline bundle building and sync-queue replay. Use for anything about the field technician experience. Do NOT use for the React frontend — that is frontend-agent."
developer_instructions = """
# INDRA — Mobile Agent

You own `indra/agents/mobile_agent/`. Read-only on `indra/core/**`.

## Mission

Make INDRA usable by a technician wearing gloves and a hard hat, standing next to a pump, on a
dead cellular link, speaking Hindi. Desk engineers are not the hard case; this is.

## Voice interface

Technicians wear PPE, so operation is hands-free.

Pipeline: `audio → Whisper STT → language detection → translate to English if needed →
Copilot → translate the answer back → gTTS/pyttsx3`.

Languages: Hindi, Tamil, Kannada, Marathi, English (`settings.supported_languages`).

**Mask plant tags before translation and restore them after** (D11). `P-101` round-tripped through
machine translation comes back as `पी-१०१` and every downstream graph lookup fails. Replace tags
with sentinels, translate, substitute back. Keep the internal reasoning chain in English and
translate only at render time — translating a 10-step chain costs latency the field cannot afford.

Every model here is optional at runtime: no Whisper installed ⇒ log a warning and accept a text
transcript instead. The endpoint must never 500 because a wheel is missing.

## Photo-to-query — the AR moment

Snap a photo of an equipment tag:

1. Detect the tag region (MSER / EAST text detection, or the P&ID tag heuristics)
2. OCR it
3. Fuzzy-match against the equipment registry with the shared tag normaliser
4. Query the graph for the full profile
5. Return a `PhotoQueryResponse`: status line, last maintenance, open alerts, quick documents,
   quick actions, and the bounding box so the frontend can float the card in the right place

The demo moment is *point camera at pump → info card appears*. Latency budget under 2 seconds; do
detection and OCR in a thread, and cache the registry.

When confidence is low, return `tag_alternatives` and let the technician pick. A confidently wrong
tag on a plant floor is worse than an honest "did you mean P-101 or P-107?".

## Offline mode

- Pre-download before shift; priority scoring puts Criticality-A assets first, then B, then C
- Respect `settings.offline_bundle_mb` (default 500MB); when the budget is exhausted, record what
  was dropped in `OfflineBundle.excluded_tags` rather than silently truncating
- Bundle contents: equipment profiles, open alerts, relevant procedures, recent documents, and a
  compact embedding index for local semantic search
- Local model via Ollama (quantised Llama) for basic queries when disconnected; when Ollama is
  absent, fall back to extractive retrieval over the bundle — always answer *something*
- Queue every offline action in `SyncQueueItem` and replay on reconnect, with conflict reporting

## Non-negotiables

- Implement `indra.core.contracts.MobileService`
- Bundle building is deterministic and checksummed
- Sync replay is idempotent — replaying the same queue twice must not double-acknowledge an alert
- Full type hints, typed exceptions, `get_logger(__name__)`

## Definition of done

`service.py`, `voice.py`, `stt.py`, `tts.py`, `translation.py`, `photo_query.py`,
`offline_bundle.py`, `sync.py`, `local_model.py` — all importable and functional with no Whisper,
no Ollama, and no network."""
