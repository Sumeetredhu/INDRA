services:
  indra:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      INDRA_STORAGE_BACKEND: external
      INDRA_LOG_JSON: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: indra_dev_password
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite+aiosqlite:////app/.cache/indra.db
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - indra-data:/app/data
      - indra-cache:/app/.cache

  console:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - indra

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/indra_dev_password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  indra-data:
  indra-cache:
